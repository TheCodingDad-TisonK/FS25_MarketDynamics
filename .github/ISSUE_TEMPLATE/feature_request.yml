name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this request:**
        - Check the roadmap in the README — your idea may already be planned.
        - Check open issues to avoid duplicates.
        - Keep requests scoped and specific. "Make prices better" will be closed. "Add a per-crop price floor setting so players can set a minimum sell price" is actionable.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration this would address. Focus on the problem, not the solution.
      placeholder: "I can't tell at a glance which crop has the best price right now without opening the full market screen."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe what you want to happen. Be specific about the behavior, not just the concept.
      placeholder: "Add a compact HUD widget that shows the top 3 highest-priced crops at the moment, updating in real time."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of other ways to solve this? Why are they not good enough?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the mod does this relate to?
      options:
        - Market Engine (price simulation)
        - World Events
        - Futures Market / Contracts
        - Market Screen / GUI
        - Settings
        - Multiplayer / Dedicated Server
        - BetterContracts Integration
        - UsedPlus Integration
        - Mod Compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, mockups, references to how other mods handle this, or any extra context.
    validations:
      required: false
